<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nate Merritt's Glorious Gecko ~ ITIS 3135 | Voting System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>The Glorious Gecko's Presidential Campaign</h1>
  
  <div id="gecko-mascot">
  <img 
    src="geckovoting.png" 
    alt="GeckoVoting"
  />
</div>

  <div class="container">

    <input type="text" id="option-input" placeholder="Add option..." />
    <button id="add-option-btn">Add Option</button>

    <select id="option-select">
      <option value="">Select option</option>
    </select>

    <input type="text" id="voter-id" placeholder="Voter ID..." />
    <button id="vote-btn">Vote</button>

    <p id="message"></p>

    <h2>Results</h2>
    <pre id="results"></pre>

  </div>

  <script src="script.js"></script>
</body>
</html>
