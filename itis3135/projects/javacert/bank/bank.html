<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
  <title>Nate Merritt's Glorious Gecko ~ ITIS 3135 | Bank Account Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div data-include="/itis3135/components/header.html"></div>

<main>

  <h1>The Glorious Gecko's Bank</h1>
  
  <div id="gecko-mascot">
  <img 
    src="geckobank.png" 
    alt="GeckoBank"
  />
</div>

  <div class="container">

    <h2>Balance</h2>
    <p id="balance">$0</p>

    <input type="number" id="deposit-amount" placeholder="Deposit amount" />
    <button id="deposit-btn">Deposit</button>

    <input type="number" id="withdraw-amount" placeholder="Withdraw amount" />
    <button id="withdraw-btn">Withdraw</button>

    <p id="message"></p>

    <h2>Transactions</h2>
    <ul id="transaction-list"></ul>

  </div>
  </main>

  <script src="script.js"></script>
  <div data-include="/itis3135/components/footer.html"></div>
<script src="/itis3135/scripts/HTMLInclude.min.js"></script>
</body>
</html>
