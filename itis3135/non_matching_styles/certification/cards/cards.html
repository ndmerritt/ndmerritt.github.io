<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
  <title>Gecko Cards</title>
  <link rel="stylesheet" href="/itis3135/styles/projects.css">

  <style>
    body {
      background-color: #e8f5e9;
      font-family: Arial, sans-serif;
    }

    #playing-cards {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .card {
      width: 150px;
      height: 200px;
      display: flex;
      justify-content: space-between;
      border: 2px solid #2e7d32;
      border-radius: 15px;
      padding: 10px;
      box-sizing: border-box;
      background: linear-gradient(135deg, #a5d6a7, #66bb6a);
      color: #1b5e20;
      font-weight: bold;
    }

    .left {
      align-self: flex-start;
    }

    .middle {
      align-self: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 20px;
    }

    .right {
      align-self: flex-end;
    }
  </style>
</head>

<div data-include="/itis3135/components/header.html"></div>

<body>

<main id="playing-cards">

    <div class="card">
      <div class="left">🦎</div>
      <div class="middle">
        <div>Alpha</div>
        <div>🌿</div>
      </div>
      <div class="right">🦎</div>
    </div>

    <div class="card">
      <div class="left">🦗</div>
      <div class="middle">
        <div>10</div>
        <div>🦗</div>
      </div>
      <div class="right">🦗</div>
    </div>

    <div class="card">
      <div class="left">🌴</div>
      <div class="middle">
        <div>King</div>
        <div>🌴</div>
      </div>
      <div class="right">🌴</div>
    </div>

</main>

	<div data-include="/itis3135/components/footer.html"></div>
	
	<script src="/itis3135/scripts/HTMLInclude.min.js"></script>
   
</body>

</html>
