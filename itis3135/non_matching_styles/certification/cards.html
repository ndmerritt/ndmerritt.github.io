<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>

  <style>
    #playing-cards {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }

   .card {
      width: 150px;
      height: 200px;
      display: flex;
      justify-content: space-between;
      border: 2px solid black;
      border-radius: 10px;
      padding: 10px;
      box-sizing: border-box;
    }

    .left {
      align-self: flex-start;
    }

    .middle {
      align-self: center;
      display: flex;
      flex-direction: column;
    }

    .right {
      align-self: flex-end;
    }
    </style>
</head>

<body>

<main id="playing-cards">
    <div class="card">
      <div class="left">♠</div>
      <div class="middle">
        <div>A</div>
        <div>♠</div>
      </div>
      <div class="right">♠</div>
    </div>

 <div class="card">
      <div class="left">♥</div>
      <div class="middle">
        <div>10</div>
        <div>♥</div>
      </div>
      <div class="right">♥</div>
    </div>

    <div class="card">
      <div class="left">♦</div>
      <div class="middle">
        <div>K</div>
        <div>♦</div>
      </div>
      <div class="right">♦</div>
    </div>
  </main>
   
</body>

</html>
