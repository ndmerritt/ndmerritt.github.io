<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product Landing Page</title>
    <link rel="stylesheet" href="styles.css">
  </head>

<body>
    <header id="header">
      <img
        id="header-img"
        src="https://cdn-icons-png.flaticon.com/512/891/891419.png"
        alt="Product Logo"
      />

      <nav id="nav-bar">
        <a class="nav-link" href="#features">Features</a>
        <a class="nav-link" href="#video-section">Demo</a>
        <a class="nav-link" href="#pricing">Pricing</a>
      </nav>
    </header>

    <section id="features" class="section">
      <h2>Features</h2>
      <p>Our product helps you stay productive and organized.</p>
      <p>It includes powerful tools designed for efficiency.</p>
    </section>

    <section id="video-section" class="section">
      <h2>Product Demo</h2>
      <iframe
        id="video"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        title="Product Demo Video"
        allowfullscreen>
      </iframe>
    </section>

    <section id="pricing" class="section">
      <h2>Pricing</h2>
      <div class="pricing-container">
        <div class="price-card">
          <h3>Basic</h3>
          <p>$9/month</p>
        </div>
        <div class="price-card">
          <h3>Pro</h3>
          <p>$19/month</p>
        </div>
        <div class="price-card">
          <h3>Enterprise</h3>
          <p>$49/month</p>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Subscribe for Updates</h2>
      <form
        id="form"
        action="https://www.freecodecamp.org/email-submit"
        method="POST">

        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email address"
          required
        />

        <input
          type="submit"
          id="submit"
          value="Subscribe"
        />
      </form>
    </section>

</body>

</html>
