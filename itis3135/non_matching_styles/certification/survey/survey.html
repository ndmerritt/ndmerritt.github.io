<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title">freeCodeCamp Survey Form</h1>
      <p id="description">Thank you for taking the time to help us improve the platform</p>
      <form id="survey-form">
        <label id="name-label">Name</label>
        <input id="name" type="text" placeholder="John Doe" required>
        <label id="email-label">Email</label>
        <input id="email" type="email" placeholder="email@gmail.com" required>
        <label id="number-label">Number</label>
        <input id="number" type="number" min="3" max="100" placeholder="5">
      <select id="dropdown">
        <option id="op1">First</option>
        <option id="op2" selected>Second</option>
        </select>
      <fieldset>
          <legend>Was this your first time at our hotel?</legend>
          <input id="yes-option" type="radio" name="hotel-stay" value="yes" />
          <label for="yes-option">Yes</label>
          <input id="no-option" type="radio" name="hotel-stay" value="no" />
          <label for="no-option">No</label>
        </fieldset>
      <input type="checkbox" value="1st">1</input>
      <input type="checkbox" value="2nd">2</input>
      <textarea col="30" row="10"></textarea>
      <button id="submit">submit</button>
  </body>
</html>
