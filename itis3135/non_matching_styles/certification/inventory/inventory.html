<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Gecko Habitat Log</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>

<body>
  <h1>Gecko Habitat Log</h1>

  <table>
    <thead>
      <tr>
        <th>Gecko Name</th>
        <th>Species</th>
        <th>Habitat Type</th>
        <th>Status</th>
        <th>Energy Level</th>
      </tr>
    </thead>

    <tbody>
      <tr class="resting">
        <td>Sticky Joe</td>
        <td>Leopard Gecko</td>
        <td>Desert</td>
        <td><span class="status">Resting</span></td>
        <td>
          <span class="rate three">
            <span></span><span></span><span></span>
          </span>
        </td>
      </tr>

      <tr class="hunting">
        <td>Leafy</td>
        <td>Crested Gecko</td>
        <td>Rainforest</td>
        <td><span class="status">Hunting</span></td>
        <td>
          <span class="rate">
            <span></span><span></span><span></span>
          </span>
        </td>
      </tr>

      <tr class="exploring">
        <td>Dash</td>
        <td>Tokay Gecko</td>
        <td>Jungle</td>
        <td><span class="status">Exploring</span></td>
        <td>
          <span class="rate">
            <span></span><span></span><span></span>
          </span>
        </td>
      </tr>

      <tr class="resting">
        <td>Cammo</td>
        <td>Day Gecko</td>
        <td>Tropical</td>
        <td><span class="status">Resting</span></td>
        <td>
          <span class="rate two">
            <span></span><span></span><span></span>
          </span>
        </td>
      </tr>
    </tbody>
  </table>

</body>
</html>
